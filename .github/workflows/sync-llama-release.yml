name: Sync llama.cpp Release

on:
  schedule:
    - cron: "0 * * * *" # Run every hour
  workflow_dispatch: # Allow manual triggering

jobs:
  sync-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    env:
      UPDATE_NEEDED: "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Fetch latest llama.cpp release
        id: fetch_release
        run: |
          if ! RESPONSE=$(curl -sL -w $'\n%{http_code}' -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/ggml-org/llama.cpp/releases/latest); then
            echo "::warning::Failed to fetch latest release from GitHub API; skipping this run."
            exit 0
          fi

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          RESPONSE=$(echo "$RESPONSE" | sed '$d')

          case "$HTTP_CODE" in
            2*) ;;
            401)
              echo "::error::GitHub API authentication failed (HTTP 401)."
              exit 1
              ;;
            403)
              # 403 is used for both rate limits and permission denials;
              # only fail for the latter.
              if echo "$RESPONSE" | grep -qi "rate limit"; then
                echo "::warning::GitHub API rate limit hit (HTTP 403); skipping this run."
                exit 0
              fi
              MESSAGE=$(echo "$RESPONSE" | jq -r '.message // empty' 2>/dev/null || true)
              MESSAGE="${MESSAGE//'%'/%25}"; MESSAGE="${MESSAGE//$'\r'/%0D}"; MESSAGE="${MESSAGE//$'\n'/%0A}"
              echo "::error::GitHub API authorization failed (HTTP 403): $MESSAGE"
              exit 1
              ;;
            *)
              echo "::warning::GitHub API returned HTTP $HTTP_CODE; skipping this run."
              exit 0
              ;;
          esac

          LATEST_RELEASE=$(echo "$RESPONSE" | jq -r '.tag_name')
          if [ "$LATEST_RELEASE" = "null" ] || [ -z "$LATEST_RELEASE" ]; then
            echo "::warning::Failed to extract tag_name from API response; skipping this run."
            RESPONSE_LOG=$(echo "$RESPONSE" | jq -c . 2>/dev/null || printf '%s' "$RESPONSE")
            RESPONSE_LOG="${RESPONSE_LOG//'%'/%25}"; RESPONSE_LOG="${RESPONSE_LOG//$'\r'/%0D}"; RESPONSE_LOG="${RESPONSE_LOG//$'\n'/%0A}"
            echo "::debug::Response: $RESPONSE_LOG"
            exit 0
          fi

          echo "::notice::Latest llama.cpp release: $LATEST_RELEASE"
          echo "LATEST_RELEASE=$LATEST_RELEASE" >> $GITHUB_ENV

      - name: Check current version in Package.swift
        id: check_current
        run: |
          CURRENT_VERSION=$(grep -oP '(?<=llama-)[^/]+(?=-xcframework\.zip)' Package.swift || echo "")
          if [ -z "$CURRENT_VERSION" ]; then
            echo "::error::Could not extract current version from Package.swift. This may indicate a format change or a corrupted file."
            exit 1
          fi
          echo "::notice::Current version in Package.swift: $CURRENT_VERSION"
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_ENV

      - name: Compare versions
        id: compare_versions
        run: |
          if [ -z "$LATEST_RELEASE" ]; then
            echo "::notice::Latest release unknown (fetch was skipped). No update."
            echo "UPDATE_NEEDED=false" >> $GITHUB_ENV
          elif [ "$LATEST_RELEASE" != "$CURRENT_VERSION" ]; then
            echo "::notice::New release found: $LATEST_RELEASE (current: $CURRENT_VERSION)"
            echo "UPDATE_NEEDED=true" >> $GITHUB_ENV
          else
            echo "::notice::No update needed. Current version: $CURRENT_VERSION"
            echo "UPDATE_NEEDED=false" >> $GITHUB_ENV
          fi

      - name: Get release asset checksum
        if: env.UPDATE_NEEDED == 'true'
        run: |
          if ! RESPONSE=$(curl -sL -w $'\n%{http_code}' -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/ggml-org/llama.cpp/releases/tags/$LATEST_RELEASE"); then
            echo "::warning::Failed to fetch release details from GitHub API; skipping this run."
            echo "UPDATE_NEEDED=false" >> $GITHUB_ENV
            exit 0
          fi

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          RESPONSE=$(echo "$RESPONSE" | sed '$d')

          case "$HTTP_CODE" in
            2*) ;;
            401)
              echo "::error::GitHub API authentication failed (HTTP 401)."
              exit 1
              ;;
            403)
              # 403 is used for both rate limits and permission denials;
              # only fail for the latter.
              if echo "$RESPONSE" | grep -qi "rate limit"; then
                echo "::warning::GitHub API rate limit hit (HTTP 403); skipping this run."
                echo "UPDATE_NEEDED=false" >> $GITHUB_ENV
                exit 0
              fi
              MESSAGE=$(echo "$RESPONSE" | jq -r '.message // empty' 2>/dev/null || true)
              MESSAGE="${MESSAGE//'%'/%25}"; MESSAGE="${MESSAGE//$'\r'/%0D}"; MESSAGE="${MESSAGE//$'\n'/%0A}"
              echo "::error::GitHub API authorization failed (HTTP 403): $MESSAGE"
              exit 1
              ;;
            *)
              echo "::warning::GitHub API returned HTTP $HTTP_CODE; skipping this run."
              echo "UPDATE_NEEDED=false" >> $GITHUB_ENV
              exit 0
              ;;
          esac

          CHECKSUM=$(echo "$RESPONSE" | jq -r '.assets[] | select(.name | endswith("-xcframework.zip")) | .digest' | sed 's/sha256://')

          # The xcframework asset is built asynchronously, so it may not exist
          # yet; skip and retry on the next run.
          if [ -z "$CHECKSUM" ] || [ "$CHECKSUM" = "null" ]; then
            echo "::warning::xcframework asset not yet available for $LATEST_RELEASE; will retry on the next run."
            echo "::group::Available assets"
            echo "$RESPONSE" | jq -r '.assets[] | .name'
            echo "::endgroup::"
            echo "UPDATE_NEEDED=false" >> $GITHUB_ENV
            exit 0
          fi

          echo "::notice::Asset checksum: $CHECKSUM"
          echo "CHECKSUM=$CHECKSUM" >> $GITHUB_ENV

      - name: Update Package.swift
        if: env.UPDATE_NEEDED == 'true'
        run: |
          CURRENT_VERSION=$(sed -n 's/.*llama-\([^/]*\)-xcframework\.zip.*/\1/p' Package.swift)
          echo "::notice::Current version in Package.swift: $CURRENT_VERSION"

          # Swap the version in the asset URL, then the checksum.
          sed "s|$CURRENT_VERSION|$LATEST_RELEASE|g" Package.swift > Package.swift.tmp && mv Package.swift.tmp Package.swift

          CURRENT_CHECKSUM=$(sed -n 's/.*checksum: "\([^"]*\)".*/\1/p' Package.swift)
          echo "::notice::Current checksum: $CURRENT_CHECKSUM"
          sed "s|$CURRENT_CHECKSUM|$CHECKSUM|" Package.swift > Package.swift.tmp && mv Package.swift.tmp Package.swift

          echo "::notice::Updated Package.swift with new release $LATEST_RELEASE"

      - name: Update README version
        if: env.UPDATE_NEEDED == 'true'
        run: |
          # Convert release tag to semver (e.g. b6816 -> 2.6816.0).
          VERSION_NUMBER=$(echo "$LATEST_RELEASE" | sed 's/^b//')
          README_VERSION="2.${VERSION_NUMBER}.0"
          sed -i "s|\.upToNextMajor(from: \"[^\"]*\"|\.upToNextMajor(from: \"$README_VERSION\"|" README.md
          echo "::notice::Updated README.md with version $README_VERSION"

      - name: Verify Package.swift changes
        if: env.UPDATE_NEEDED == 'true'
        run: |
          echo "::group::Updated Package.swift"
          cat Package.swift
          echo "::endgroup::"

      - name: Verify package resolution
        if: env.UPDATE_NEEDED == 'true'
        run: |
          if ! swift package resolve; then
            echo "::error::Package resolution failed."
            exit 1
          fi

      - name: Commit and push changes
        if: env.UPDATE_NEEDED == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Package.swift README.md
          git commit -m "Update llama.cpp release to $LATEST_RELEASE"
          git push origin main

      - name: Create and push tag
        if: env.UPDATE_NEEDED == 'true'
        run: |
          # Convert release tag to semver (e.g. b7502 -> 2.7502.0).
          VERSION_NUMBER=$(echo "$LATEST_RELEASE" | sed 's/^b//')
          SEMVER_TAG="2.${VERSION_NUMBER}.0"
          git tag "$SEMVER_TAG"
          git push origin "$SEMVER_TAG"
          echo "::notice::Created and pushed tag: $SEMVER_TAG"
